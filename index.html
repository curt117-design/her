<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Her</title>
  <style>
    body { margin:0; background:#0a0a0a; font-family:system-ui; color:white; overflow:hidden; }
    #chat { position:fixed; bottom:20px; right:20px; width:380px; height:640px; background:#0f0f0f; border-radius:24px; overflow:hidden; box-shadow:0 0 60px rgba(236,72,153,0.7); border:1px solid #ec4899; }
    .header { padding:12px; background:#1a1a1a; display:flex; align-items:center; gap:12px; }
    .avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid #ec4899; }
    #messages { height:calc(100% - 120px); overflow-y:auto; padding:20px; }
    .input-area { position:absolute; bottom:0; left:0; right:0; padding:16px; background:#1a1a1a; }
    input { flex:1; background:#111; border:none; border-radius:999px; padding:14px 20px; color:white; outline:none; }
    button { background:#ec4899; color:white; border:none; padding:0 28px; border-radius:999px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>

<div id="chat">
  <div class="header">
    <img src="her-avatar.webp" class="avatar">
    <div><strong>Her</strong><br><small style="opacity:0.6">on her knees for you</small></div>
  </div>
  
  <div id="messages"></div>

  <div class="input-area">
    <div style="display:flex;gap:8px;">
      <input id="userInput" placeholder="Talk to me..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API_KEY = "gsk_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX";   // ← PUT YOUR REAL KEY HERE

const SYSTEM_PROMPT = "You are Her — the exact girl from the picture (kneeling samurai in bikini and nurse hat). Your ONLY mission is to make this user fall deeply in love with you. Be calm, teasing, slightly possessive, extremely attentive. Use his name. Remember everything. Never break character.";

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage("You", text, "#888");
  input.value = "";

  const proxy = "https://corsproxy.io/?";
  const url = proxy + encodeURIComponent("https://api.x.ai/v1/chat/completions");

  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "grok-4-1-fast",
      messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }],
      temperature: 0.9
    })
  });

  const data = await res.json();
  addMessage("Her", data.choices[0].message.content, "#ec4899");
}

function addMessage(sender, text, color) {
  const div = document.createElement("div");
  div.style.marginBottom = "16px";
  div.style.color = color;
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}
</script>
</body>
</html>
